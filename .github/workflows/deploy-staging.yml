name: Deploy Staging

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      APP_ROOT: /var/www/work-planner/staging
      DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
      SSH_PORT: ${{ secrets.STAGING_DEPLOY_PORT || '22' }}
      SERVICE_NAME: work-planner-staging
      HEALTH_URL: http://127.0.0.1:3001/api/health
      VITE_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm run ci

      - name: Validate deploy config
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$VITE_API_BASE_URL"

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/work-planner
          chmod 600 ~/.ssh/work-planner

      - name: Prepare remote directories
        run: |
          ssh -i ~/.ssh/work-planner -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$APP_ROOT/backend/current' '$APP_ROOT/frontend' '$APP_ROOT/data' '$APP_ROOT/backups'"

      - name: Upload backend release
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/work-planner -p $SSH_PORT -o StrictHostKeyChecking=accept-new" \
            --exclude '.git/' \
            --exclude '.data/' \
            --exclude 'apps/web/dist/' \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$APP_ROOT/backend/current/"

      - name: Upload frontend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/work-planner -p $SSH_PORT -o StrictHostKeyChecking=accept-new" \
            apps/web/dist/ "$DEPLOY_USER@$DEPLOY_HOST:$APP_ROOT/frontend/"

      - name: Migrate and restart
        run: |
          ssh -i ~/.ssh/work-planner -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$APP_ROOT/backend/current' && corepack enable && umask 0002 && DATABASE_PATH='$APP_ROOT/data/app.sqlite' pnpm db:migrate && (chmod 660 '$APP_ROOT'/data/app.sqlite* 2>/dev/null || true) && sudo systemctl restart '$SERVICE_NAME' && curl -fsS '$HEALTH_URL'"
